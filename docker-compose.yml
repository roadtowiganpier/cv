services:

  nginx:
    image: nginx:alpine
    container_name: cb_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing:/var/www/landing:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
    depends_on:
      - ghost
    networks:
      - cb_network

  ghost:
    image: ghost:5-alpine
    container_name: cb_ghost
    restart: unless-stopped
    environment:
      NODE_ENV: production
      url: ${GHOST_URL}
      database__client: mysql
      database__connection__host: db
      database__connection__user: ${MYSQL_USER}
      database__connection__password: ${MYSQL_PASSWORD}
      database__connection__database: ${MYSQL_DATABASE}
      mail__transport: SMTP
      mail__options__host: ${MAIL_HOST:-localhost}
      mail__options__port: ${MAIL_PORT:-25}
    volumes:
      - ghost-content:/var/lib/ghost/content
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cb_network

  db:
    image: mysql:8.0
    container_name: cb_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cb_network

  certbot:
    image: certbot/certbot
    container_name: cb_certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./landing:/var/www/landing
    # Run manually: docker compose run certbot certonly --webroot ...

volumes:
  ghost-content:
  mysql-data:
  certbot-etc:
  certbot-var:

networks:
  cb_network:
    driver: bridge
